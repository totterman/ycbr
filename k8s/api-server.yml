apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  labels:
    app: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: api-server
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api-server
          image: ghcr.io/totterman/ycbr/api-server:0.9.1
          env:
          #  - name: HOSTNAME
          #    value: LOCALHOST_NAME
            - name: PGUSER
              value: ycbr
            - name: POSTGRES_DB
              value: ycbr
            - name: POSTGRES_PASSWORD
              value: ycbr-secret
            - name: POSTGRES_USER
              value: ycbr
            - name: API_SERVER_PORT
              value: "7082"
            - name: REVERSE_PROXY_URI
              value: http://baatbesiktning.in.totterman.com:80
            - name: SERVER_ADDRESS
              value: 0.0.0.0
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/ycbr
            - name: SPRING_PROFILES_ACTIVE
              value: minikube
            - name: ISSUER
              value: http://baatbesiktning.in.totterman.com/auth/realms/ycbr
          ports:
            - containerPort: 7082
              protocol: TCP
          resources:
            limits:
              memory: "1073741824"
          volumeMounts:
#            - mountPath: /opt/certfile.pem
#              name: api-server-cm0
#              subPath: certfile.pem
#            - mountPath: /opt/keyfile.pem
#              name: api-server-cm1
#              subPath: keyfile.pem
      restartPolicy: Always
      volumes:
#        - configMap:
#            items:
#              - key: cert.pem
#                path: certfile.pem
#            name: api-server-cm0
#          name: api-server-cm0
#        - configMap:
#            items:
#              - key: key.pem
#                path: keyfile.pem
#            name: api-server-cm1
#          name: api-server-cm1
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  labels:
    app: api-server
spec:
  type: ClusterIP
  selector:
    app: api-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7082

